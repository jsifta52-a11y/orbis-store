<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orbis Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a1a2f;
  color: white;
}

.topbar {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 15px;
  background: #0f2a4a;
  border-bottom: 1px solid #2c6fb2;
}

.tab {
  padding: 10px 16px;
  background: #1f6feb;
  border-radius: 8px;
  cursor: pointer;
}

.card {
  background: #0f2a4a;
  padding: 30px;
  border-radius: 14px;
  width: 380px;
  margin: 80px auto;
  text-align: center;
  border: 1px solid #2c6fb2;
}

input, select, button {
  width: 100%;
  box-sizing: border-box;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
}

input, select {
  background: #0a1a2f;
  border: 1px solid #2c6fb2;
  color: white;
}

button {
  background: #1f6feb;
  border: none;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #388bfd;
}

.result {
  margin-top: 10px;
  color: #4aa3ff;
}

/* FOOTER */
.footer {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-top: 40px;
}

.icon {
  width: 42px;
  height: 42px;
  background: #0f2a4a;
  border: 1px solid #2c6fb2;
  border-radius: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.2s;
  cursor: pointer;
}

.icon:hover {
  background: #1f6feb;
}

.icon img {
  width: 20px;
  height: 20px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="tab">Generator</div>
  <div class="tab" onclick="location.href='redeem.html'">Redeem</div>
  <div class="tab" onclick="window.open('https://github.com')">GitHub</div>
  <div class="tab">Info</div>
</div>

<div class="card">
  <h2>Code Generator</h2>

  <input id="url" placeholder="Enter URL">

  <select id="type">
    <option value="free">Free (24h)</option>
    <option value="premium">Premium (Watch Ads)</option>
  </select>

  <button id="mainBtn" onclick="handleAction()">Generate</button>

  <div class="result" id="result">Waiting...</div>
</div>

<!-- SOCIAL ICONS -->
<div class="footer">

  <a class="icon" href="https://twitter.com" target="_blank">
    <img src="https://cdn.simpleicons.org/x/ffffff" alt="X">
  </a>

  <a class="icon" href="https://discord.com" target="_blank">
    <img src="https://cdn.simpleicons.org/discord/ffffff" alt="Discord">
  </a>

  <a class="icon" href="https://github.com" target="_blank">
    <img src="https://cdn.simpleicons.org/github/ffffff" alt="GitHub">
  </a>

  <a class="icon" href="#">
    <img src="https://cdn.simpleicons.org/info/ffffff" alt="Info">
  </a>

</div>

<script>
const API = "https://orbis-api.jsifta52.workers.dev";

let adsWatched = 0;

function resetAds() {
  adsWatched = 0;
  document.getElementById("mainBtn").innerText = "Generate";
}

document.getElementById("type").addEventListener("change", resetAds);

async function handleAction() {
  const type = document.getElementById("type").value;

  if (type === "premium") {
    return watchAds();
  }

  return generate("free");
}

function watchAds() {
  const btn = document.getElementById("mainBtn");
  const result = document.getElementById("result");

  adsWatched++;

  result.innerText = `Watching ads ${adsWatched}/2`;
  btn.innerText = `Watch Ads (${adsWatched}/2)`;

  if (adsWatched >= 2) {
    btn.innerText = "Generating...";

    setTimeout(() => {
      adsWatched = 0;
      btn.innerText = "Generate";
      generate("premium");
    }, 800);
  }
}

async function generate(type) {
  const url = document.getElementById("url").value;
  const result = document.getElementById("result");

  result.innerHTML = "Generating...";

  try {
    const res = await fetch(API + "/create", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ url, type })
    });

    const data = await res.json();

    if (data.success) {
      result.innerHTML = "CODE: " + data.code;
    } else {
      result.innerHTML = "ERROR: " + data.error;
    }

  } catch (e) {
    result.innerHTML = "NETWORK ERROR";
  }
}
</script>

</body>
</html>
</html>
