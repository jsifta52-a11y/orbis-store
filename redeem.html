<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Orbis Redeem</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a1a2f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #0f2a4a;
  padding: 30px;
  border-radius: 14px;
  width: 380px;
  box-shadow: 0 0 25px rgba(0, 100, 255, 0.25);
  border: 1px solid rgba(0, 150, 255, 0.3);
  text-align: center;
}

h1 {
  font-size: 22px;
  margin-bottom: 20px;
  color: #4aa3ff;
  letter-spacing: 1px;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #2c6fb2;
  background: #0a1a2f;
  color: white;
  outline: none;
  margin-bottom: 12px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1f6feb;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #388bfd;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #0a1a2f;
  border: 1px solid #2c6fb2;
  border-radius: 8px;
  word-break: break-all;
  color: #4aa3ff;
}
</style>
</head>

<body>

<div class="card">
  <h1>REDEEM CODE</h1>

  <input id="code" placeholder="Zadej kód">
  <button onclick="redeem()">REDEEM</button>

  <div class="result" id="result">Waiting...</div>
</div>

<script>
const API = "https://orbis-api.jsifta52.workers.dev";

async function redeem() {
  const code = document.getElementById("code").value;
  const result = document.getElementById("result");

  result.innerHTML = "Loading...";

  try {
    const res = await fetch(API + "/redeem", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({code})
    });

    const data = await res.json();

    if (data.success) {
      result.innerHTML = "URL: " + data.url;
    } else {
      result.innerHTML = "ERROR: " + data.error;
    }

  } catch (e) {
    result.innerHTML = "NETWORK ERROR";
  }
}
</script>

</body>
</html>
