<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orbis Redeem</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a1a2f;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 15px;
  background: #0f2a4a;
  border-bottom: 1px solid #2c6fb2;
  width: 100%;
}

.tab {
  padding: 10px 16px;
  background: #1f6feb;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.tab:hover {
  background: #388bfd;
}

/* CARD */
.card {
  margin-top: 80px;
  background: #0f2a4a;
  padding: 30px;
  border-radius: 14px;
  width: 380px;
  box-shadow: 0 0 25px rgba(0, 100, 255, 0.25);
  border: 1px solid rgba(0, 150, 255, 0.3);
  text-align: center;
}

h1 {
  font-size: 22px;
  margin-bottom: 20px;
  color: #4aa3ff;
  letter-spacing: 1px;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #2c6fb2;
  background: #0a1a2f;
  color: white;
  outline: none;
  margin-bottom: 12px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1f6feb;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #388bfd;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #0a1a2f;
  border: 1px solid #2c6fb2;
  border-radius: 8px;
  word-break: break-all;
  color: #4aa3ff;
}

/* FOOTER ICONS */
.footer {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-top: 40px;
}

.icon {
  width: 42px;
  height: 42px;
  background: #0f2a4a;
  border: 1px solid #2c6fb2;
  border-radius: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.2s;
  cursor: pointer;
  text-decoration: none;
}

.icon:hover {
  background: #1f6feb;
}

.icon img {
  width: 20px;
  height: 20px;
}
</style>
</head>

<body>

<!-- TOP MENU -->
<div class="topbar">
  <div class="tab" onclick="location.href='index.html'">Generator</div>
  <div class="tab">Redeem</div>
  <div class="tab" onclick="window.open('https://github.com')">GitHub</div>
  <div class="tab">Info</div>
</div>

<!-- MAIN CARD -->
<div class="card">
  <h1>REDEEM CODE</h1>

  <input id="code" placeholder="Enter code">
  <button onclick="redeem()">REDEEM</button>

  <div class="result" id="result">Waiting...</div>
</div>

<!-- FOOTER ICONS -->
<div class="footer">

  <a class="icon" href="https://twitter.com" target="_blank">
    <img src="https://cdn.simpleicons.org/x/ffffff" alt="X">
  </a>

  <a class="icon" href="https://discord.com" target="_blank">
    <img src="https://cdn.simpleicons.org/discord/ffffff" alt="Discord">
  </a>

  <a class="icon" href="https://github.com" target="_blank">
    <img src="https://cdn.simpleicons.org/github/ffffff" alt="GitHub">
  </a>

  <a class="icon" href="#">
    <img src="https://cdn.simpleicons.org/info/ffffff" alt="Info">
  </a>

</div>

<script>
const API = "https://orbis-api.jsifta52.workers.dev";

async function redeem() {
  const code = document.getElementById("code").value;
  const result = document.getElementById("result");

  result.innerHTML = "Loading...";

  try {
    const res = await fetch(API + "/redeem", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({code})
    });

    const data = await res.json();

    if (data.success) {
      result.innerHTML = "URL: " + data.url;
    } else {
      result.innerHTML = "ERROR: " + data.error;
    }

  } catch (e) {
    result.innerHTML = "NETWORK ERROR";
  }
}
</script>

</body>
</html>
